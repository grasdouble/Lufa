name: DS:Tools:Tokens:Validate Token Usage

on:
  pull_request:
    paths:
      - 'packages/design-system/tokens/src/**/*.json'
      - 'packages/design-system/tokens/dist/**'
      - 'packages/design-system/main/src/**/*.css'
      - 'packages/design-system/main/src/**/*.ts'
      - 'packages/design-system/main/src/**/*.tsx'
      - 'packages/design-system/main/src/**/*.cjs'
      - 'packages/design-system/storybook/src/**/*.css'
      - 'packages/design-system/storybook/src/**/*.ts'
      - 'packages/design-system/storybook/src/**/*.tsx'
      - 'packages/design-system/themes/src/**/*.css'
      - 'packages/design-system/docusaurus/src/**/*.css'
      - 'packages/design-system/docusaurus/src/**/*.ts'
      - 'packages/design-system/docusaurus/src/**/*.tsx'
      - 'packages/design-system/cli/src/**/*.css'
      - 'packages/design-system/cli/src/**/*.ts'
      - 'packages/design-system/tokens/scripts/validate-token-usage.js'
  push:
    branches:
      - main
    paths:
      - 'packages/design-system/tokens/src/**/*.json'
      - 'packages/design-system/tokens/dist/**'
      - 'packages/design-system/main/src/**/*.css'
      - 'packages/design-system/main/src/**/*.ts'
      - 'packages/design-system/main/src/**/*.tsx'
      - 'packages/design-system/main/src/**/*.cjs'
      - 'packages/design-system/storybook/src/**/*.css'
      - 'packages/design-system/storybook/src/**/*.ts'
      - 'packages/design-system/storybook/src/**/*.tsx'
      - 'packages/design-system/themes/src/**/*.css'
      - 'packages/design-system/docusaurus/src/**/*.css'
      - 'packages/design-system/docusaurus/src/**/*.ts'
      - 'packages/design-system/docusaurus/src/**/*.tsx'
      - 'packages/design-system/cli/src/**/*.css'
      - 'packages/design-system/cli/src/**/*.ts'
      - 'packages/design-system/tokens/scripts/validate-token-usage.js'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-token-usage:
    name: Validate Token Usage
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📦 Build tokens before validation
        run: pnpm ds:tokens:build

      # ── DS Main ──────────────────────────────────────────────────────────

      - name: 🔍 Validate token usage — DS Main
        id: validate-main
        run: |
          echo "::group::DS Main — Token Usage Validation"
          pnpm ds:main:validate:token-usage
          echo "::endgroup::"
        continue-on-error: true

      # ── DS Storybook ─────────────────────────────────────────────────────

      - name: 🔍 Validate token usage — DS Storybook
        id: validate-storybook
        run: |
          echo "::group::DS Storybook — Token Usage Validation"
          pnpm ds:storybook:validate:token-usage
          echo "::endgroup::"
        continue-on-error: true

      # ── DS Themes ─────────────────────────────────────────────────────────

      - name: 🔍 Validate token usage — DS Themes
        id: validate-themes
        run: |
          echo "::group::DS Themes — Token Usage Validation"
          pnpm ds:themes:validate:token-usage
          echo "::endgroup::"
        continue-on-error: true

      # ── DS Docusaurus ─────────────────────────────────────────────────────

      - name: 🔍 Validate token usage — DS Docusaurus
        id: validate-docusaurus
        run: |
          echo "::group::DS Docusaurus — Token Usage Validation"
          pnpm ds:docusaurus:validate:token-usage
          echo "::endgroup::"
        continue-on-error: true

      # ── DS CLI ───────────────────────────────────────────────────────────

      - name: 🔍 Validate token usage — DS CLI
        id: validate-cli
        run: |
          echo "::group::DS CLI — Token Usage Validation"
          pnpm ds:cli:validate:token-usage
          echo "::endgroup::"
        continue-on-error: true

      # ── PR Comment ────────────────────────────────────────────────────────

      - name: 💬 Build validation comment
        if: github.event_name == 'pull_request'
        id: build-comment
        env:
          MAIN_OUTCOME: ${{ steps.validate-main.outcome }}
          STORYBOOK_OUTCOME: ${{ steps.validate-storybook.outcome }}
          THEMES_OUTCOME: ${{ steps.validate-themes.outcome }}
          DOCUSAURUS_OUTCOME: ${{ steps.validate-docusaurus.outcome }}
          CLI_OUTCOME: ${{ steps.validate-cli.outcome }}
        run: |
          MAIN_STATUS="✅ Passed"
          STORYBOOK_STATUS="✅ Passed"
          THEMES_STATUS="✅ Passed"
          DOCUSAURUS_STATUS="✅ Passed"
          CLI_STATUS="✅ Passed"
          [[ "$MAIN_OUTCOME" == "failure" ]] && MAIN_STATUS="❌ Failed"
          [[ "$STORYBOOK_OUTCOME" == "failure" ]] && STORYBOOK_STATUS="❌ Failed"
          [[ "$THEMES_OUTCOME" == "failure" ]] && THEMES_STATUS="❌ Failed"
          [[ "$DOCUSAURUS_OUTCOME" == "failure" ]] && DOCUSAURUS_STATUS="❌ Failed"
          [[ "$CLI_OUTCOME" == "failure" ]] && CLI_STATUS="❌ Failed"

          # Only re-capture outputs when there are failures (avoids redundant runs on success)
          MAIN_OUTPUT=""
          STORYBOOK_OUTPUT=""
          THEMES_OUTPUT=""
          DOCUSAURUS_OUTPUT=""
          CLI_OUTPUT=""
          if [[ "$MAIN_OUTCOME" == "failure" ]]; then
            MAIN_OUTPUT=$(pnpm ds:main:validate:token-usage 2>&1 | sed 's/\x1B\[[0-9;]*[mK]//g' || true)
          fi
          if [[ "$STORYBOOK_OUTCOME" == "failure" ]]; then
            STORYBOOK_OUTPUT=$(pnpm ds:storybook:validate:token-usage 2>&1 | sed 's/\x1B\[[0-9;]*[mK]//g' || true)
          fi
          if [[ "$THEMES_OUTCOME" == "failure" ]]; then
            THEMES_OUTPUT=$(pnpm ds:themes:validate:token-usage 2>&1 | sed 's/\x1B\[[0-9;]*[mK]//g' || true)
          fi
          if [[ "$DOCUSAURUS_OUTCOME" == "failure" ]]; then
            DOCUSAURUS_OUTPUT=$(pnpm ds:docusaurus:validate:token-usage 2>&1 | sed 's/\x1B\[[0-9;]*[mK]//g' || true)
          fi
          if [[ "$CLI_OUTCOME" == "failure" ]]; then
            CLI_OUTPUT=$(pnpm ds:cli:validate:token-usage 2>&1 | sed 's/\x1B\[[0-9;]*[mK]//g' || true)
          fi

          {
            echo 'comment-body<<EOF_COMMENT'
            cat << EOF
          <!-- token-usage-validation-comment -->
          ## 🔍 Design Token Usage Validation

          | Package | Status |
          |---|---|
          | DS Main | ${MAIN_STATUS} |
          | DS Storybook | ${STORYBOOK_STATUS} |
          | DS Themes | ${THEMES_STATUS} |
          | DS Docusaurus | ${DOCUSAURUS_STATUS} |
          | DS CLI | ${CLI_STATUS} |

          $(if [[ "$MAIN_OUTCOME" == "failure" ]]; then
            cat << 'MAIN_SECTION'
          <details>
          <summary>📋 DS Main — Validation Report</summary>

          \`\`\`
          MAIN_SECTION
            echo "${MAIN_OUTPUT}"
            cat << 'MAIN_CLOSE'
          \`\`\`

          </details>
          MAIN_CLOSE
          fi)

          $(if [[ "$STORYBOOK_OUTCOME" == "failure" ]]; then
            cat << 'STORYBOOK_SECTION'
          <details>
          <summary>📋 DS Storybook — Validation Report</summary>

          \`\`\`
          STORYBOOK_SECTION
            echo "${STORYBOOK_OUTPUT}"
            cat << 'STORYBOOK_CLOSE'
          \`\`\`

          </details>
          STORYBOOK_CLOSE
          fi)

          $(if [[ "$THEMES_OUTCOME" == "failure" ]]; then
            cat << 'THEMES_SECTION'
          <details>
          <summary>📋 DS Themes — Validation Report</summary>

          \`\`\`
          THEMES_SECTION
            echo "${THEMES_OUTPUT}"
            cat << 'THEMES_CLOSE'
          \`\`\`

          </details>
          THEMES_CLOSE
          fi)

          $(if [[ "$DOCUSAURUS_OUTCOME" == "failure" ]]; then
            cat << 'DOC_SECTION'
          <details>
          <summary>📋 DS Docusaurus — Validation Report</summary>

          \`\`\`
          DOC_SECTION
            echo "${DOCUSAURUS_OUTPUT}"
            cat << 'DOC_CLOSE'
          \`\`\`

          </details>
          DOC_CLOSE
          fi)

          $(if [[ "$CLI_OUTCOME" == "failure" ]]; then
            cat << 'CLI_SECTION'
          <details>
          <summary>📋 DS CLI — Validation Report</summary>

          \`\`\`
          CLI_SECTION
            echo "${CLI_OUTPUT}"
            cat << 'CLI_CLOSE'
          \`\`\`

          </details>
          CLI_CLOSE
          fi)

          $(if [[ "$MAIN_OUTCOME" == "failure" || "$STORYBOOK_OUTCOME" == "failure" || "$THEMES_OUTCOME" == "failure" || "$DOCUSAURUS_OUTCOME" == "failure" || "$CLI_OUTCOME" == "failure" ]]; then
            cat << 'FIX_SECTION'
          ### 💡 How to Fix

          A token is referenced in source code but not defined in \`tokens/dist/tokens.css\`.

          - Check that the token exists in \`packages/design-system/tokens/src/\`
          - Run \`pnpm ds:tokens:build\` to regenerate \`tokens.css\` after any token change
          - 🧪 Run locally: \`pnpm ds:all:validate:token-usage\`
          FIX_SECTION
          fi)

          ---

          *Part of Lufa Design System v2.0 - Automated token usage validation*
          EOF
            echo 'EOF_COMMENT'
          } >> $GITHUB_OUTPUT

      - name: 💬 Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-marker: '<!-- token-usage-validation-comment -->'
          comment-body: ${{ steps.build-comment.outputs.comment-body }}

      # ── Final gate ────────────────────────────────────────────────────────

      - name: ❌ Fail if any validation errors
        if: steps.validate-main.outcome == 'failure' || steps.validate-storybook.outcome == 'failure' || steps.validate-themes.outcome == 'failure' || steps.validate-docusaurus.outcome == 'failure' || steps.validate-cli.outcome == 'failure'
        run: |
          [[ "${{ steps.validate-main.outcome }}" == "failure" ]] && \
            echo "::error::DS Main token usage validation failed."
          [[ "${{ steps.validate-storybook.outcome }}" == "failure" ]] && \
            echo "::error::DS Storybook token usage validation failed."
          [[ "${{ steps.validate-themes.outcome }}" == "failure" ]] && \
            echo "::error::DS Themes token usage validation failed."
          [[ "${{ steps.validate-docusaurus.outcome }}" == "failure" ]] && \
            echo "::error::DS Docusaurus token usage validation failed."
          [[ "${{ steps.validate-cli.outcome }}" == "failure" ]] && \
            echo "::error::DS CLI token usage validation failed."
          exit 1

      - name: ✅ All token usages are valid
        if: steps.validate-main.outcome == 'success' && steps.validate-storybook.outcome == 'success' && steps.validate-themes.outcome == 'success' && steps.validate-docusaurus.outcome == 'success' && steps.validate-cli.outcome == 'success'
        run: echo "::notice::All token usages are valid in DS Main, DS Storybook, DS Themes, DS Docusaurus and DS CLI."
