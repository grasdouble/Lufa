name: DS:Tools:Storybook:On-PR

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, closed]

permissions: {}

jobs:
  # ── Publish Storybook ────────────────────────────────────────────────────────
  publish-storybook-to-pr:
    name: Publish Storybook to PR
    if: github.event.action != 'closed' && contains(github.event.pull_request.labels.*.name, 'publish-storybook')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: none
      checks: none
      deployments: none
      issues: none
      packages: none
      pull-requests: write
      repository-projects: none
      security-events: none
      statuses: none

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build design system
        uses: ./.github/actions/build-design-system
        with:
          build-storybook: 'true'
          build-docusaurus: 'false'

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/design-system/storybook/storybook-static
          publish_branch: gh-pages
          destination_dir: pr-${{ github.event.pull_request.number }}
          cname: ''

      - name: 💬 Add comment with Storybook link
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🎉 The Storybook for this PR has been published! You can view it [here](https://grasdouble.github.io/Lufa/pr-${{ github.event.pull_request.number }}/).

      - name: 🏷️ Remove 'publish-storybook' label
        uses: actions-ecosystem/action-remove-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: publish-storybook

  # ── Cleanup Storybook ────────────────────────────────────────────────────────
  cleanup-storybook:
    name: Cleanup Storybook on PR close
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: none
      checks: none
      deployments: none
      issues: none
      packages: none
      pull-requests: none
      repository-projects: none
      security-events: none
      statuses: none

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🌿 Checkout gh-pages branch
        run: |
          git fetch origin gh-pages
          git checkout gh-pages

      - name: 🔎 Check if PR folder exists
        id: check_folder
        run: |
          FOLDER="pr-${{ github.event.pull_request.number }}"
          if [ -d "$FOLDER" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 🗑️ Remove PR folder and commit changes
        if: steps.check_folder.outputs.exists == 'true'
        run: |
          FOLDER="pr-${{ github.event.pull_request.number }}"
          rm -rf "$FOLDER"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Cleanup Storybook for PR #${{ github.event.pull_request.number }}"

      - name: 📤 Push changes
        if: steps.check_folder.outputs.exists == 'true'
        run: git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
