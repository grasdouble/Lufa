name: DS:Tools:Packages:CI

on:
  pull_request:
    paths:
      - 'packages/design-system/main/**'
      - 'packages/design-system/tokens/**'
      - 'packages/design-system/themes/**'
      - 'packages/design-system/storybook/**'
      - 'packages/design-system/docusaurus/**'
      - 'packages/design-system/cli/**'
      - 'packages/design-system/playwright/**'
      - '.github/actions/design-system-checks/**'
      - '.github/actions/design-system-performance-budgets/**'
      - '.github/workflows/ds-tools-packages-ci.yml'
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  # ── Detect which jobs need to run ────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      perf: ${{ steps.filter.outputs.perf }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔎 Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            packages:
              - 'packages/design-system/main/**'
              - 'packages/design-system/tokens/**'
              - 'packages/design-system/themes/**'
              - 'packages/design-system/storybook/**'
              - 'packages/design-system/docusaurus/**'
              - 'packages/design-system/cli/**'
              - 'packages/design-system/playwright/**'
              - '.github/actions/design-system-checks/**'
              - '.github/workflows/ds-tools-packages-ci.yml'
            perf:
              - 'packages/design-system/main/src/**'
              - 'packages/design-system/tokens/**/*.json'
              - 'packages/design-system/main/vite.config.ts'
              - 'packages/design-system/main/package.json'
              - '.github/actions/design-system-performance-budgets/**'
              - '.github/workflows/ds-tools-packages-ci.yml'

  # ── Quality checks ───────────────────────────────────────────────────────────
  ds-packages-ci:
    name: DS Packages CI
    needs: changes
    if: needs.changes.outputs.packages == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build design system
        uses: ./.github/actions/design-system-build
        with:
          build-storybook: 'false'
          build-docusaurus: 'false'

      - name: 🔍 Run all DS checks
        id: checks
        uses: ./.github/actions/design-system-checks
        with:
          run-url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-marker: '<!-- ds-packages-ci-report -->'
          comment-body: ${{ steps.checks.outputs.comment-body }}

      - name: ❌ Fail if any check failed
        if: steps.checks.outputs.overall == 'failure'
        run: |
          echo "::error::${{ steps.checks.outputs.failures }} DS package check(s) failed. See the CI report comment on the PR for details."
          exit 1

      - name: ✅ All checks passed
        if: steps.checks.outputs.overall == 'success'
        run: echo "::notice::All DS package checks passed! 🎉"

  # ── Performance budgets ──────────────────────────────────────────────────────
  performance-budgets:
    name: Performance Budgets
    needs: changes
    if: needs.changes.outputs.perf == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build design system
        uses: ./.github/actions/design-system-build
        with:
          build-storybook: 'false'
          build-docusaurus: 'false'

      - name: ⚡ Run performance budget checks
        id: perf
        uses: ./.github/actions/design-system-performance-budgets
        with:
          run-url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-marker: '<!-- performance-budget-comment -->'
          comment-body: ${{ steps.perf.outputs.comment-body }}

      - name: ❌ Fail if budgets exceeded
        if: steps.perf.outputs.overall == 'failure'
        run: |
          echo "::error::${{ steps.perf.outputs.failures }} performance budget(s) exceeded. See the report comment on the PR for details."
          exit 1

      - name: ✅ All budgets passed
        if: steps.perf.outputs.overall == 'success'
        run: echo "::notice::All performance budgets passed! 🎉"
