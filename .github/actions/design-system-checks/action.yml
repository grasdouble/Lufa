name: 'Design System Checks'
description: 'Run all quality checks across design system packages and report results on PR'

inputs:
  run-url:
    description: 'URL of the current workflow run for the PR comment link'
    required: false
    default: ''

outputs:
  overall:
    description: 'Overall outcome: success or failure'
    value: ${{ steps.aggregate.outputs.overall }}
  failures:
    description: 'Number of failed checks'
    value: ${{ steps.aggregate.outputs.failures }}
  comment-body:
    description: 'Markdown body of the CI report, ready to post as a PR comment'
    value: ${{ steps.build-comment.outputs.body }}

runs:
  using: 'composite'
  steps:
    # ── Tokens ──────────────────────────────────────────────────────────────

    - name: 🪙 Tokens — validate:tokens
      id: tokens-validate-tokens
      shell: bash
      run: |
        echo "::group::Tokens — validate:tokens"
        pnpm --filter @grasdouble/lufa_design-system-tokens run validate:tokens
        echo "::endgroup::"
      continue-on-error: true

    - name: 🪙 Tokens — prettier:check
      id: tokens-prettier
      shell: bash
      run: |
        echo "::group::Tokens — prettier:check"
        pnpm --filter @grasdouble/lufa_design-system-tokens run prettier:check
        echo "::endgroup::"
      continue-on-error: true

    # ── Themes ──────────────────────────────────────────────────────────────

    - name: 🎨 Themes — lint
      id: themes-lint
      shell: bash
      run: |
        echo "::group::Themes — lint"
        pnpm --filter @grasdouble/lufa_design-system-themes run lint
        echo "::endgroup::"
      continue-on-error: true

    - name: 🎨 Themes — typecheck
      id: themes-typecheck
      shell: bash
      run: |
        echo "::group::Themes — typecheck"
        pnpm --filter @grasdouble/lufa_design-system-themes run typecheck
        echo "::endgroup::"
      continue-on-error: true

    - name: 🎨 Themes — validate:token-usage
      id: themes-token-usage
      shell: bash
      run: |
        echo "::group::Themes — validate:token-usage"
        pnpm --filter @grasdouble/lufa_design-system-themes run validate:token-usage
        echo "::endgroup::"
      continue-on-error: true

    - name: 🎨 Themes — validate:theme:all
      id: themes-validate
      shell: bash
      run: |
        echo "::group::Themes — validate:theme:all"
        pnpm --filter @grasdouble/lufa_design-system-themes run validate:theme:all
        echo "::endgroup::"
      continue-on-error: true

    - name: 🎨 Themes — prettier:check
      id: themes-prettier
      shell: bash
      run: |
        echo "::group::Themes — prettier:check"
        pnpm --filter @grasdouble/lufa_design-system-themes run prettier:check
        echo "::endgroup::"
      continue-on-error: true

    # ── Main ────────────────────────────────────────────────────────────────

    - name: 🧩 Main — lint
      id: main-lint
      shell: bash
      run: |
        echo "::group::Main — lint"
        pnpm --filter @grasdouble/lufa_design-system run lint
        echo "::endgroup::"
      continue-on-error: true

    - name: 🧩 Main — typecheck
      id: main-typecheck
      shell: bash
      run: |
        echo "::group::Main — typecheck"
        pnpm --filter @grasdouble/lufa_design-system run typecheck
        echo "::endgroup::"
      continue-on-error: true

    - name: 🧩 Main — validate:token-usage
      id: main-token-usage
      shell: bash
      run: |
        echo "::group::Main — validate:token-usage"
        pnpm --filter @grasdouble/lufa_design-system run validate:token-usage
        echo "::endgroup::"
      continue-on-error: true

    - name: 🧩 Main — validate:components:strict
      id: main-validate-components
      shell: bash
      run: |
        echo "::group::Main — validate:components:strict"
        pnpm --filter @grasdouble/lufa_design-system run validate:components:strict
        echo "::endgroup::"
      continue-on-error: true

    - name: 🧩 Main — prettier:check
      id: main-prettier
      shell: bash
      run: |
        echo "::group::Main — prettier:check"
        pnpm --filter @grasdouble/lufa_design-system run prettier:check
        echo "::endgroup::"
      continue-on-error: true

    # ── Storybook ───────────────────────────────────────────────────────────

    - name: 📖 Storybook — lint
      id: storybook-lint
      shell: bash
      run: |
        echo "::group::Storybook — lint"
        pnpm --filter @grasdouble/lufa_design-system-storybook run lint
        echo "::endgroup::"
      continue-on-error: true

    - name: 📖 Storybook — typecheck
      id: storybook-typecheck
      shell: bash
      run: |
        echo "::group::Storybook — typecheck"
        pnpm --filter @grasdouble/lufa_design-system-storybook run typecheck
        echo "::endgroup::"
      continue-on-error: true

    - name: 📖 Storybook — validate:token-usage
      id: storybook-token-usage
      shell: bash
      run: |
        echo "::group::Storybook — validate:token-usage"
        pnpm --filter @grasdouble/lufa_design-system-storybook run validate:token-usage
        echo "::endgroup::"
      continue-on-error: true

    - name: 📖 Storybook — prettier:check
      id: storybook-prettier
      shell: bash
      run: |
        echo "::group::Storybook — prettier:check"
        pnpm --filter @grasdouble/lufa_design-system-storybook run prettier:check
        echo "::endgroup::"
      continue-on-error: true

    # ── CLI ─────────────────────────────────────────────────────────────────

    - name: 🔧 CLI — lint
      id: cli-lint
      shell: bash
      run: |
        echo "::group::CLI — lint"
        pnpm --filter @grasdouble/lufa_design-system-cli run lint
        echo "::endgroup::"
      continue-on-error: true

    - name: 🔧 CLI — typecheck
      id: cli-typecheck
      shell: bash
      run: |
        echo "::group::CLI — typecheck"
        pnpm --filter @grasdouble/lufa_design-system-cli run typecheck
        echo "::endgroup::"
      continue-on-error: true

    - name: 🔧 CLI — validate:token-usage
      id: cli-token-usage
      shell: bash
      run: |
        echo "::group::CLI — validate:token-usage"
        pnpm --filter @grasdouble/lufa_design-system-cli run validate:token-usage
        echo "::endgroup::"
      continue-on-error: true

    - name: 🔧 CLI — prettier:check
      id: cli-prettier
      shell: bash
      run: |
        echo "::group::CLI — prettier:check"
        pnpm --filter @grasdouble/lufa_design-system-cli run prettier:check
        echo "::endgroup::"
      continue-on-error: true

    # ── Docusaurus ──────────────────────────────────────────────────────────

    - name: 📚 Docusaurus — lint
      id: docusaurus-lint
      shell: bash
      run: |
        echo "::group::Docusaurus — lint"
        pnpm --filter @grasdouble/lufa_design-system-docusaurus run lint
        echo "::endgroup::"
      continue-on-error: true

    - name: 📚 Docusaurus — typecheck
      id: docusaurus-typecheck
      shell: bash
      run: |
        echo "::group::Docusaurus — typecheck"
        pnpm --filter @grasdouble/lufa_design-system-docusaurus run typecheck
        echo "::endgroup::"
      continue-on-error: true

    - name: 📚 Docusaurus — validate:token-usage
      id: docusaurus-token-usage
      shell: bash
      run: |
        echo "::group::Docusaurus — validate:token-usage"
        pnpm --filter @grasdouble/lufa_design-system-docusaurus run validate:token-usage
        echo "::endgroup::"
      continue-on-error: true

    - name: 📚 Docusaurus — prettier:check
      id: docusaurus-prettier
      shell: bash
      run: |
        echo "::group::Docusaurus — prettier:check"
        pnpm --filter @grasdouble/lufa_design-system-docusaurus run prettier:check
        echo "::endgroup::"
      continue-on-error: true

    # ── Playwright ──────────────────────────────────────────────────────────

    - name: 🎭 Playwright — lint
      id: playwright-lint
      shell: bash
      run: |
        echo "::group::Playwright — lint"
        pnpm --filter @grasdouble/lufa_design-system-playwright run lint
        echo "::endgroup::"
      continue-on-error: true

    - name: 🎭 Playwright — typecheck
      id: playwright-typecheck
      shell: bash
      run: |
        echo "::group::Playwright — typecheck"
        pnpm --filter @grasdouble/lufa_design-system-playwright run typecheck
        echo "::endgroup::"
      continue-on-error: true

    - name: 🎭 Playwright — validate:token-usage
      id: playwright-token-usage
      shell: bash
      run: |
        echo "::group::Playwright — validate:token-usage"
        pnpm --filter @grasdouble/lufa_design-system-playwright run validate:token-usage
        echo "::endgroup::"
      continue-on-error: true

    - name: 🎭 Playwright — prettier:check
      id: playwright-prettier
      shell: bash
      run: |
        echo "::group::Playwright — prettier:check"
        pnpm --filter @grasdouble/lufa_design-system-playwright run prettier:check
        echo "::endgroup::"
      continue-on-error: true

    # ── Aggregate ────────────────────────────────────────────────────────────

    - name: 📊 Aggregate results
      id: aggregate
      shell: bash
      run: |
        FAILURES=0
        OUTCOMES=(
          "${{ steps.tokens-validate-tokens.outcome }}"
          "${{ steps.tokens-prettier.outcome }}"
          "${{ steps.themes-lint.outcome }}"
          "${{ steps.themes-typecheck.outcome }}"
          "${{ steps.themes-token-usage.outcome }}"
          "${{ steps.themes-validate.outcome }}"
          "${{ steps.themes-prettier.outcome }}"
          "${{ steps.main-lint.outcome }}"
          "${{ steps.main-typecheck.outcome }}"
          "${{ steps.main-token-usage.outcome }}"
          "${{ steps.main-validate-components.outcome }}"
          "${{ steps.main-prettier.outcome }}"
          "${{ steps.storybook-lint.outcome }}"
          "${{ steps.storybook-typecheck.outcome }}"
          "${{ steps.storybook-token-usage.outcome }}"
          "${{ steps.storybook-prettier.outcome }}"
          "${{ steps.cli-lint.outcome }}"
          "${{ steps.cli-typecheck.outcome }}"
          "${{ steps.cli-token-usage.outcome }}"
          "${{ steps.cli-prettier.outcome }}"
          "${{ steps.docusaurus-lint.outcome }}"
          "${{ steps.docusaurus-typecheck.outcome }}"
          "${{ steps.docusaurus-token-usage.outcome }}"
          "${{ steps.docusaurus-prettier.outcome }}"
          "${{ steps.playwright-lint.outcome }}"
          "${{ steps.playwright-typecheck.outcome }}"
          "${{ steps.playwright-token-usage.outcome }}"
          "${{ steps.playwright-prettier.outcome }}"
        )
        for STATUS in "${OUTCOMES[@]}"; do
          [[ "$STATUS" == "failure" ]] && FAILURES=$((FAILURES + 1))
        done
        echo "failures=$FAILURES" >> $GITHUB_OUTPUT
        [[ $FAILURES -eq 0 ]] && echo "overall=success" >> $GITHUB_OUTPUT || echo "overall=failure" >> $GITHUB_OUTPUT

    # ── Build PR comment body ─────────────────────────────────────────────────

    - name: 📝 Build PR comment body
      id: build-comment
      shell: bash
      env:
        TOKENS_VALIDATE_TOKENS: ${{ steps.tokens-validate-tokens.outcome }}
        TOKENS_PRETTIER: ${{ steps.tokens-prettier.outcome }}
        THEMES_LINT: ${{ steps.themes-lint.outcome }}
        THEMES_TYPECHECK: ${{ steps.themes-typecheck.outcome }}
        THEMES_TOKEN_USAGE: ${{ steps.themes-token-usage.outcome }}
        THEMES_VALIDATE: ${{ steps.themes-validate.outcome }}
        THEMES_PRETTIER: ${{ steps.themes-prettier.outcome }}
        MAIN_LINT: ${{ steps.main-lint.outcome }}
        MAIN_TYPECHECK: ${{ steps.main-typecheck.outcome }}
        MAIN_TOKEN_USAGE: ${{ steps.main-token-usage.outcome }}
        MAIN_VALIDATE_COMPONENTS: ${{ steps.main-validate-components.outcome }}
        MAIN_PRETTIER: ${{ steps.main-prettier.outcome }}
        STORYBOOK_LINT: ${{ steps.storybook-lint.outcome }}
        STORYBOOK_TYPECHECK: ${{ steps.storybook-typecheck.outcome }}
        STORYBOOK_TOKEN_USAGE: ${{ steps.storybook-token-usage.outcome }}
        STORYBOOK_PRETTIER: ${{ steps.storybook-prettier.outcome }}
        CLI_LINT: ${{ steps.cli-lint.outcome }}
        CLI_TYPECHECK: ${{ steps.cli-typecheck.outcome }}
        CLI_TOKEN_USAGE: ${{ steps.cli-token-usage.outcome }}
        CLI_PRETTIER: ${{ steps.cli-prettier.outcome }}
        DOCUSAURUS_LINT: ${{ steps.docusaurus-lint.outcome }}
        DOCUSAURUS_TYPECHECK: ${{ steps.docusaurus-typecheck.outcome }}
        DOCUSAURUS_TOKEN_USAGE: ${{ steps.docusaurus-token-usage.outcome }}
        DOCUSAURUS_PRETTIER: ${{ steps.docusaurus-prettier.outcome }}
        PLAYWRIGHT_LINT: ${{ steps.playwright-lint.outcome }}
        PLAYWRIGHT_TYPECHECK: ${{ steps.playwright-typecheck.outcome }}
        PLAYWRIGHT_TOKEN_USAGE: ${{ steps.playwright-token-usage.outcome }}
        PLAYWRIGHT_PRETTIER: ${{ steps.playwright-prettier.outcome }}
        OVERALL: ${{ steps.aggregate.outputs.overall }}
        FAILURES: ${{ steps.aggregate.outputs.failures }}
        RUN_URL: ${{ inputs.run-url }}
      run: |
        si() { [[ "$1" == "success" ]] && echo "✅" || echo "❌"; }
        sl() { [[ "$1" == "success" ]] && echo "Passed" || echo "Failed"; }

        {
          echo "<!-- ds-packages-ci-report -->"
          echo "## 🧩 Design System Packages — CI Report"
          echo ""

          if [[ "$OVERALL" == "success" ]]; then
            echo "### ✅ All checks passed!"
            echo ""
            echo "All design system package checks completed successfully. 🎉"
          else
            echo "### ⚠️ ${FAILURES} check(s) failed"
            echo ""
            echo "Please review and fix the issues highlighted below."
          fi

          echo ""
          echo "### 📋 Check Summary"
          echo ""
          echo "| Package | Check | Status |"
          echo "|---------|-------|--------|"
          echo "| 🪙 Tokens | validate:tokens | $(si "$TOKENS_VALIDATE_TOKENS") $(sl "$TOKENS_VALIDATE_TOKENS") |"
          echo "| 🪙 Tokens | prettier:check | $(si "$TOKENS_PRETTIER") $(sl "$TOKENS_PRETTIER") |"
          echo "| 🎨 Themes | lint | $(si "$THEMES_LINT") $(sl "$THEMES_LINT") |"
          echo "| 🎨 Themes | typecheck | $(si "$THEMES_TYPECHECK") $(sl "$THEMES_TYPECHECK") |"
          echo "| 🎨 Themes | validate:token-usage | $(si "$THEMES_TOKEN_USAGE") $(sl "$THEMES_TOKEN_USAGE") |"
          echo "| 🎨 Themes | validate:theme:all | $(si "$THEMES_VALIDATE") $(sl "$THEMES_VALIDATE") |"
          echo "| 🎨 Themes | prettier:check | $(si "$THEMES_PRETTIER") $(sl "$THEMES_PRETTIER") |"
          echo "| 🧩 Main | lint | $(si "$MAIN_LINT") $(sl "$MAIN_LINT") |"
          echo "| 🧩 Main | typecheck | $(si "$MAIN_TYPECHECK") $(sl "$MAIN_TYPECHECK") |"
          echo "| 🧩 Main | validate:token-usage | $(si "$MAIN_TOKEN_USAGE") $(sl "$MAIN_TOKEN_USAGE") |"
          echo "| 🧩 Main | validate:components:strict | $(si "$MAIN_VALIDATE_COMPONENTS") $(sl "$MAIN_VALIDATE_COMPONENTS") |"
          echo "| 🧩 Main | prettier:check | $(si "$MAIN_PRETTIER") $(sl "$MAIN_PRETTIER") |"
          echo "| 📖 Storybook | lint | $(si "$STORYBOOK_LINT") $(sl "$STORYBOOK_LINT") |"
          echo "| 📖 Storybook | typecheck | $(si "$STORYBOOK_TYPECHECK") $(sl "$STORYBOOK_TYPECHECK") |"
          echo "| 📖 Storybook | validate:token-usage | $(si "$STORYBOOK_TOKEN_USAGE") $(sl "$STORYBOOK_TOKEN_USAGE") |"
          echo "| 📖 Storybook | prettier:check | $(si "$STORYBOOK_PRETTIER") $(sl "$STORYBOOK_PRETTIER") |"
          echo "| 🔧 CLI | lint | $(si "$CLI_LINT") $(sl "$CLI_LINT") |"
          echo "| 🔧 CLI | typecheck | $(si "$CLI_TYPECHECK") $(sl "$CLI_TYPECHECK") |"
          echo "| 🔧 CLI | validate:token-usage | $(si "$CLI_TOKEN_USAGE") $(sl "$CLI_TOKEN_USAGE") |"
          echo "| 🔧 CLI | prettier:check | $(si "$CLI_PRETTIER") $(sl "$CLI_PRETTIER") |"
          echo "| 📚 Docusaurus | lint | $(si "$DOCUSAURUS_LINT") $(sl "$DOCUSAURUS_LINT") |"
          echo "| 📚 Docusaurus | typecheck | $(si "$DOCUSAURUS_TYPECHECK") $(sl "$DOCUSAURUS_TYPECHECK") |"
          echo "| 📚 Docusaurus | validate:token-usage | $(si "$DOCUSAURUS_TOKEN_USAGE") $(sl "$DOCUSAURUS_TOKEN_USAGE") |"
          echo "| 📚 Docusaurus | prettier:check | $(si "$DOCUSAURUS_PRETTIER") $(sl "$DOCUSAURUS_PRETTIER") |"
          echo "| 🎭 Playwright | lint | $(si "$PLAYWRIGHT_LINT") $(sl "$PLAYWRIGHT_LINT") |"
          echo "| 🎭 Playwright | typecheck | $(si "$PLAYWRIGHT_TYPECHECK") $(sl "$PLAYWRIGHT_TYPECHECK") |"
          echo "| 🎭 Playwright | validate:token-usage | $(si "$PLAYWRIGHT_TOKEN_USAGE") $(sl "$PLAYWRIGHT_TOKEN_USAGE") |"
          echo "| 🎭 Playwright | prettier:check | $(si "$PLAYWRIGHT_PRETTIER") $(sl "$PLAYWRIGHT_PRETTIER") |"

          if [[ "$OVERALL" != "success" ]]; then
            echo ""
            echo "### 💡 How to Fix"
            echo ""
            [[ "$TOKENS_VALIDATE_TOKENS" == "failure" ]]    && echo "- **Tokens — validate:tokens:** \`pnpm --filter @grasdouble/lufa_design-system-tokens run validate:tokens\`"
            [[ "$TOKENS_PRETTIER" == "failure" ]]           && echo "- **Tokens — prettier:** \`pnpm --filter @grasdouble/lufa_design-system-tokens run prettier:write\`"
            [[ "$THEMES_LINT" == "failure" ]]               && echo "- **Themes — lint:** \`pnpm --filter @grasdouble/lufa_design-system-themes run lint\`"
            [[ "$THEMES_TYPECHECK" == "failure" ]]          && echo "- **Themes — typecheck:** \`pnpm --filter @grasdouble/lufa_design-system-themes run typecheck\`"
            [[ "$THEMES_TOKEN_USAGE" == "failure" ]]        && echo "- **Themes — token-usage:** \`pnpm --filter @grasdouble/lufa_design-system-themes run validate:token-usage\`"
            [[ "$THEMES_VALIDATE" == "failure" ]]           && echo "- **Themes — validate:theme:all:** \`pnpm --filter @grasdouble/lufa_design-system-themes run validate:theme:all\`"
            [[ "$THEMES_PRETTIER" == "failure" ]]           && echo "- **Themes — prettier:** \`pnpm --filter @grasdouble/lufa_design-system-themes run prettier:write\`"
            [[ "$MAIN_LINT" == "failure" ]]                 && echo "- **Main — lint:** \`pnpm --filter @grasdouble/lufa_design-system run lint\`"
            [[ "$MAIN_TYPECHECK" == "failure" ]]            && echo "- **Main — typecheck:** \`pnpm --filter @grasdouble/lufa_design-system run typecheck\`"
            [[ "$MAIN_TOKEN_USAGE" == "failure" ]]          && echo "- **Main — token-usage:** \`pnpm --filter @grasdouble/lufa_design-system run validate:token-usage\`"
            [[ "$MAIN_VALIDATE_COMPONENTS" == "failure" ]]  && echo "- **Main — validate:components:strict:** \`pnpm --filter @grasdouble/lufa_design-system run validate:components:strict\`"
            [[ "$MAIN_PRETTIER" == "failure" ]]             && echo "- **Main — prettier:** \`pnpm --filter @grasdouble/lufa_design-system run prettier:write\`"
            [[ "$STORYBOOK_LINT" == "failure" ]]            && echo "- **Storybook — lint:** \`pnpm --filter @grasdouble/lufa_design-system-storybook run lint\`"
            [[ "$STORYBOOK_TYPECHECK" == "failure" ]]       && echo "- **Storybook — typecheck:** \`pnpm --filter @grasdouble/lufa_design-system-storybook run typecheck\`"
            [[ "$STORYBOOK_TOKEN_USAGE" == "failure" ]]     && echo "- **Storybook — token-usage:** \`pnpm --filter @grasdouble/lufa_design-system-storybook run validate:token-usage\`"
            [[ "$STORYBOOK_PRETTIER" == "failure" ]]        && echo "- **Storybook — prettier:** \`pnpm --filter @grasdouble/lufa_design-system-storybook run prettier:write\`"
            [[ "$CLI_LINT" == "failure" ]]                  && echo "- **CLI — lint:** \`pnpm --filter @grasdouble/lufa_design-system-cli run lint\`"
            [[ "$CLI_TYPECHECK" == "failure" ]]             && echo "- **CLI — typecheck:** \`pnpm --filter @grasdouble/lufa_design-system-cli run typecheck\`"
            [[ "$CLI_TOKEN_USAGE" == "failure" ]]           && echo "- **CLI — token-usage:** \`pnpm --filter @grasdouble/lufa_design-system-cli run validate:token-usage\`"
            [[ "$CLI_PRETTIER" == "failure" ]]              && echo "- **CLI — prettier:** \`pnpm --filter @grasdouble/lufa_design-system-cli run prettier:write\`"
            [[ "$DOCUSAURUS_LINT" == "failure" ]]           && echo "- **Docusaurus — lint:** \`pnpm --filter @grasdouble/lufa_design-system-docusaurus run lint\`"
            [[ "$DOCUSAURUS_TYPECHECK" == "failure" ]]      && echo "- **Docusaurus — typecheck:** \`pnpm --filter @grasdouble/lufa_design-system-docusaurus run typecheck\`"
            [[ "$DOCUSAURUS_TOKEN_USAGE" == "failure" ]]    && echo "- **Docusaurus — token-usage:** \`pnpm --filter @grasdouble/lufa_design-system-docusaurus run validate:token-usage\`"
            [[ "$DOCUSAURUS_PRETTIER" == "failure" ]]       && echo "- **Docusaurus — prettier:** \`pnpm --filter @grasdouble/lufa_design-system-docusaurus run prettier:write\`"
            [[ "$PLAYWRIGHT_LINT" == "failure" ]]           && echo "- **Playwright — lint:** \`pnpm --filter @grasdouble/lufa_design-system-playwright run lint\`"
            [[ "$PLAYWRIGHT_TYPECHECK" == "failure" ]]      && echo "- **Playwright — typecheck:** \`pnpm --filter @grasdouble/lufa_design-system-playwright run typecheck\`"
            [[ "$PLAYWRIGHT_TOKEN_USAGE" == "failure" ]]    && echo "- **Playwright — token-usage:** \`pnpm --filter @grasdouble/lufa_design-system-playwright run validate:token-usage\`"
            [[ "$PLAYWRIGHT_PRETTIER" == "failure" ]]       && echo "- **Playwright — prettier:** \`pnpm --filter @grasdouble/lufa_design-system-playwright run prettier:write\`"
          fi

          echo ""
          echo "---"
          echo ""
          echo "*📊 [View full run details](${RUN_URL})*"
        } > /tmp/ds-ci-comment.md

        {
          echo "body<<EOF_COMMENT"
          cat /tmp/ds-ci-comment.md
          echo "EOF_COMMENT"
        } >> $GITHUB_OUTPUT

        cat /tmp/ds-ci-comment.md >> $GITHUB_STEP_SUMMARY
