name: 'Performance Budgets'
description: 'Measure bundle size, build time and CSS cascade performance against configured budgets'

inputs:
  run-url:
    description: 'URL of the current workflow run for the PR comment link'
    required: false
    default: ''

outputs:
  overall:
    description: 'Overall outcome: success or failure'
    value: ${{ steps.aggregate.outputs.overall }}
  failures:
    description: 'Number of failed budget checks'
    value: ${{ steps.aggregate.outputs.failures }}
  comment-body:
    description: 'Markdown body of the performance report, ready to post as a PR comment'
    value: ${{ steps.build-comment.outputs.body }}

runs:
  using: 'composite'
  steps:
    # ── Measurements ─────────────────────────────────────────────────────────

    - name: ⏱️ Measure build time
      id: build-time
      shell: bash
      run: |
        echo "::group::Build time measurement"
        BUILD_START=$(date +%s%3N)
        pnpm --filter @grasdouble/lufa_design-system-tokens build > /dev/null 2>&1 || true
        pnpm --filter @grasdouble/lufa_design-system-themes build > /dev/null 2>&1 || true
        pnpm --filter @grasdouble/lufa_design-system build > /dev/null 2>&1 || true
        BUILD_END=$(date +%s%3N)
        BUILD_TIME_MS=$((BUILD_END - BUILD_START))
        BUILD_TIME_SEC=$(echo "scale=2; $BUILD_TIME_MS / 1000" | bc)
        echo "value_sec=${BUILD_TIME_SEC}" >> $GITHUB_OUTPUT
        echo "Build time: ${BUILD_TIME_SEC}s"
        echo "::endgroup::"

    - name: 📦 Measure bundle size
      id: bundle-size
      shell: bash
      run: |
        echo "::group::Bundle size measurement"
        DIST="packages/design-system/main/dist"

        if [ -f "${DIST}/lufa-ui.mjs" ]; then
          JS_BYTES=$(stat -c%s "${DIST}/lufa-ui.mjs" 2>/dev/null || stat -f%z "${DIST}/lufa-ui.mjs")
          JS_KB=$(echo "scale=2; $JS_BYTES / 1024" | bc)
        else
          JS_KB=0
          echo "⚠️ lufa-ui.mjs not found"
        fi

        if [ -f "${DIST}/style.css" ]; then
          CSS_BYTES=$(stat -c%s "${DIST}/style.css" 2>/dev/null || stat -f%z "${DIST}/style.css")
          CSS_KB=$(echo "scale=2; $CSS_BYTES / 1024" | bc)
        else
          CSS_KB=0
          echo "⚠️ style.css not found"
        fi

        TOTAL_KB=$(echo "${JS_KB} + ${CSS_KB}" | bc)

        if command -v gzip &> /dev/null && [ -f "${DIST}/lufa-ui.mjs" ]; then
          GZIP_JS=$(gzip -c "${DIST}/lufa-ui.mjs" | wc -c)
          GZIP_CSS=0
          [ -f "${DIST}/style.css" ] && GZIP_CSS=$(gzip -c "${DIST}/style.css" | wc -c)
          GZIP_KB=$(echo "scale=2; ($GZIP_JS + $GZIP_CSS) / 1024" | bc)
        else
          GZIP_KB="N/A"
        fi

        echo "js_kb=${JS_KB}"       >> $GITHUB_OUTPUT
        echo "css_kb=${CSS_KB}"     >> $GITHUB_OUTPUT
        echo "total_kb=${TOTAL_KB}" >> $GITHUB_OUTPUT
        echo "gzip_kb=${GZIP_KB}"   >> $GITHUB_OUTPUT

        echo "JS: ${JS_KB} KB | CSS: ${CSS_KB} KB | Total: ${TOTAL_KB} KB | Gzipped: ${GZIP_KB} KB"
        echo "::endgroup::"

    - name: 🎨 Measure CSS cascade validation time
      id: css-cascade
      shell: bash
      run: |
        echo "::group::CSS cascade measurement"
        cat > /tmp/test-theme.css << 'THEMEEOF'
        [data-mode="light"] {
          --lufa-semantic-ui-text-primary: var(--lufa-core-color-neutral-text-primary);
          --lufa-semantic-ui-bg-primary: var(--lufa-core-color-neutral-bg-primary);
          --lufa-core-color-neutral-text-primary: var(--lufa-primitive-color-gray-900);
          --lufa-core-color-neutral-bg-primary: var(--lufa-primitive-color-white);
          --lufa-primitive-color-gray-900: #111827;
          --lufa-primitive-color-white: #ffffff;
        }
        THEMEEOF

        CASCADE_START=$(date +%s%3N)
        pnpm --filter @grasdouble/lufa_design-system-cli exec tsx src/index.ts validate --theme /tmp/test-theme.css --all > /tmp/cascade-output.txt 2>&1 || true
        CASCADE_END=$(date +%s%3N)
        CASCADE_MS=$((CASCADE_END - CASCADE_START))

        echo "value_ms=${CASCADE_MS}" >> $GITHUB_OUTPUT
        echo "CSS cascade validation: ${CASCADE_MS}ms"
        echo "::endgroup::"

    # ── Budget checks ─────────────────────────────────────────────────────────

    - name: 📊 Check budgets
      id: budget-check
      shell: bash
      env:
        BUILD_TIME_SEC: ${{ steps.build-time.outputs.value_sec }}
        TOTAL_KB: ${{ steps.bundle-size.outputs.total_kb }}
        GZIP_KB: ${{ steps.bundle-size.outputs.gzip_kb }}
        CASCADE_MS: ${{ steps.css-cascade.outputs.value_ms }}
      run: |
        echo "::group::Budget checks"
        CONFIG="${GITHUB_ACTION_PATH}/budgets.json"

        BUNDLE_BUDGET=$(jq -r '.budgets.bundle.totalSize.max' "$CONFIG")
        GZIP_BUDGET=$(jq -r '.budgets.bundle.gzipped.max' "$CONFIG")
        BUILD_BUDGET=$(jq -r '.budgets.timing.build.max' "$CONFIG")
        CASCADE_BUDGET=$(jq -r '.budgets.timing.cssCascade.max' "$CONFIG")

        FAILURES=0

        # Bundle size
        if (( $(echo "$TOTAL_KB > $BUNDLE_BUDGET" | bc -l) )); then
          echo "bundle_pass=false" >> $GITHUB_OUTPUT
          FAILURES=$((FAILURES + 1))
          echo "❌ Bundle: ${TOTAL_KB} KB > ${BUNDLE_BUDGET} KB"
        else
          echo "bundle_pass=true" >> $GITHUB_OUTPUT
          echo "✅ Bundle: ${TOTAL_KB} KB <= ${BUNDLE_BUDGET} KB"
        fi

        # Gzipped size
        if [ "${GZIP_KB}" != "N/A" ]; then
          if (( $(echo "$GZIP_KB > $GZIP_BUDGET" | bc -l) )); then
            echo "gzip_pass=false" >> $GITHUB_OUTPUT
            FAILURES=$((FAILURES + 1))
            echo "❌ Gzipped: ${GZIP_KB} KB > ${GZIP_BUDGET} KB"
          else
            echo "gzip_pass=true" >> $GITHUB_OUTPUT
            echo "✅ Gzipped: ${GZIP_KB} KB <= ${GZIP_BUDGET} KB"
          fi
        else
          echo "gzip_pass=N/A" >> $GITHUB_OUTPUT
          echo "ℹ️ Gzip not available"
        fi

        # Build time
        if (( $(echo "$BUILD_TIME_SEC > $BUILD_BUDGET" | bc -l) )); then
          echo "build_pass=false" >> $GITHUB_OUTPUT
          FAILURES=$((FAILURES + 1))
          echo "❌ Build: ${BUILD_TIME_SEC}s > ${BUILD_BUDGET}s"
        else
          echo "build_pass=true" >> $GITHUB_OUTPUT
          echo "✅ Build: ${BUILD_TIME_SEC}s <= ${BUILD_BUDGET}s"
        fi

        # CSS cascade (warning only — does not count as failure)
        if (( CASCADE_MS > CASCADE_BUDGET )); then
          echo "cascade_pass=warning" >> $GITHUB_OUTPUT
          echo "⚠️ CSS cascade: ${CASCADE_MS}ms > ${CASCADE_BUDGET}ms (warning only)"
        else
          echo "cascade_pass=true" >> $GITHUB_OUTPUT
          echo "✅ CSS cascade: ${CASCADE_MS}ms <= ${CASCADE_BUDGET}ms"
        fi

        echo "failures=${FAILURES}" >> $GITHUB_OUTPUT
        echo "::endgroup::"

    # ── Aggregate ─────────────────────────────────────────────────────────────

    - name: 📊 Aggregate results
      id: aggregate
      shell: bash
      env:
        FAILURES: ${{ steps.budget-check.outputs.failures }}
      run: |
        echo "failures=${FAILURES}" >> $GITHUB_OUTPUT
        [[ "$FAILURES" -eq 0 ]] && echo "overall=success" >> $GITHUB_OUTPUT || echo "overall=failure" >> $GITHUB_OUTPUT

    # ── Build PR comment body ─────────────────────────────────────────────────

    - name: 📝 Build PR comment body
      id: build-comment
      shell: bash
      env:
        OVERALL: ${{ steps.aggregate.outputs.overall }}
        FAILURES: ${{ steps.aggregate.outputs.failures }}
        BUILD_TIME_SEC: ${{ steps.build-time.outputs.value_sec }}
        JS_KB: ${{ steps.bundle-size.outputs.js_kb }}
        CSS_KB: ${{ steps.bundle-size.outputs.css_kb }}
        TOTAL_KB: ${{ steps.bundle-size.outputs.total_kb }}
        GZIP_KB: ${{ steps.bundle-size.outputs.gzip_kb }}
        CASCADE_MS: ${{ steps.css-cascade.outputs.value_ms }}
        BUNDLE_PASS: ${{ steps.budget-check.outputs.bundle_pass }}
        GZIP_PASS: ${{ steps.budget-check.outputs.gzip_pass }}
        BUILD_PASS: ${{ steps.budget-check.outputs.build_pass }}
        CASCADE_PASS: ${{ steps.budget-check.outputs.cascade_pass }}
        RUN_URL: ${{ inputs.run-url }}
      run: |
        CONFIG="${GITHUB_ACTION_PATH}/budgets.json"
        BUNDLE_BUDGET=$(jq -r '.budgets.bundle.totalSize.max' "$CONFIG")
        GZIP_BUDGET=$(jq -r '.budgets.bundle.gzipped.max' "$CONFIG")
        BUILD_BUDGET=$(jq -r '.budgets.timing.build.max' "$CONFIG")
        CASCADE_BUDGET=$(jq -r '.budgets.timing.cssCascade.max' "$CONFIG")

        sp() {
          case "$1" in
            true)    echo "✅ Pass" ;;
            false)   echo "❌ Fail" ;;
            warning) echo "⚠️ Warning" ;;
            *)       echo "N/A" ;;
          esac
        }

        if [ "${GZIP_KB}" != "N/A" ] && [ "${TOTAL_KB}" != "0" ]; then
          GZIP_RATIO=$(echo "scale=0; (${GZIP_KB} * 100) / ${TOTAL_KB}" | bc)
        else
          GZIP_RATIO="N/A"
        fi

        {
          echo "<!-- performance-budget-comment -->"
          echo "## ⚡ Performance Budget Report"
          echo ""

          if [[ "$OVERALL" == "success" ]]; then
            echo "### ✅ All Performance Budgets Passed!"
            echo ""
            echo "Your changes meet all performance requirements. Great work! 🎉"
          else
            echo "### ⚠️ ${FAILURES} Performance Budget(s) Exceeded"
            echo ""
            echo "Please review the metrics below and optimise your changes."
          fi

          echo ""
          echo "### 📊 Performance Metrics"
          echo ""
          echo "| Metric | Current | Budget | Status |"
          echo "|--------|---------|--------|--------|"
          echo "| **Bundle Size** | ${TOTAL_KB} KB | ${BUNDLE_BUDGET} KB | $(sp "$BUNDLE_PASS") |"
          echo "| **JS Size** | ${JS_KB} KB | — | ℹ️ Info |"
          echo "| **CSS Size** | ${CSS_KB} KB | — | ℹ️ Info |"

          if [ "${GZIP_KB}" != "N/A" ]; then
            echo "| **Gzipped Size** | ${GZIP_KB} KB | ${GZIP_BUDGET} KB | $(sp "$GZIP_PASS") |"
          fi

          echo "| **Build Time** | ${BUILD_TIME_SEC}s | ${BUILD_BUDGET}s | $(sp "$BUILD_PASS") |"
          echo "| **CSS Cascade** | ${CASCADE_MS}ms | ${CASCADE_BUDGET}ms | $(sp "$CASCADE_PASS") |"

          echo ""
          echo "### 📦 Size Breakdown"
          echo ""
          echo '```'
          echo "JavaScript : ${JS_KB} KB"
          echo "CSS        : ${CSS_KB} KB"
          echo "─────────────────────"
          echo "Total      : ${TOTAL_KB} KB"
          if [ "${GZIP_KB}" != "N/A" ]; then
            echo "Gzipped    : ${GZIP_KB} KB (${GZIP_RATIO}% of uncompressed)"
          fi
          echo '```'

          echo ""
          echo "### ⏱️ Timing Breakdown"
          echo ""
          echo '```'
          echo "Build       : ${BUILD_TIME_SEC}s"
          echo "CSS Cascade : ${CASCADE_MS}ms"
          echo '```'

          if [[ "$OVERALL" != "success" ]]; then
            echo ""
            echo "### 💡 How to Fix"
            echo ""
            if [[ "$BUNDLE_PASS" == "false" ]]; then
              echo "**Bundle Size Exceeded:**"
              echo "- Review component complexity and remove unused code"
              echo "- Check for duplicate dependencies or heavy libraries"
              echo "- Run \`pnpm ds:main:build\` locally to analyse the bundle"
              echo ""
            fi
            if [[ "$GZIP_PASS" == "false" ]]; then
              echo "**Gzipped Size Exceeded:**"
              echo "- Ensure minification is working correctly"
              echo "- Remove comments and debug code"
              echo "- Check for repetitive code patterns"
              echo ""
            fi
            if [[ "$BUILD_PASS" == "false" ]]; then
              echo "**Build Time Exceeded:**"
              echo "- Check for expensive build-time operations"
              echo "- Review Vite configuration for optimisation opportunities"
              echo ""
            fi
          fi

          echo ""
          echo "---"
          echo ""
          echo "*📊 [View full run details](${RUN_URL})*"
        } > /tmp/perf-comment.md

        {
          echo "body<<EOF_COMMENT"
          cat /tmp/perf-comment.md
          echo "EOF_COMMENT"
        } >> $GITHUB_OUTPUT

        cat /tmp/perf-comment.md >> $GITHUB_STEP_SUMMARY
